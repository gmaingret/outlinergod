services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    volumes:
      - outlinergod-data:/data
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      WEB_DIST_PATH: /app/web/dist
    restart: unless-stopped

volumes:
  outlinergod-data:
